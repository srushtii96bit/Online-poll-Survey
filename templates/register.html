<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-5">

            <div class="card shadow-lg border-0">

                <div class="card-body p-5">

                    <h2 class="text-center text-success mb-4">
                        Create Account
                    </h2>

                    <p class="text-center text-muted mb-4">
                        Register to use the Online Poll Survey System
                    </p>

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">
                                Username
                            </label>

                            <input type="text"
                                   name="username"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Password
                            </label>

                            <input type="password"
                                   name="password"
                                   class="form-control"
                                   required>
                        </div>

                        <button type="submit"
                                class="btn btn-success w-100">
                            Register
                        </button>

                    </form>

                    <hr>

                    <p class="text-center">
                        Already have an account?
                    </p>

                    <a href="/login"
                       class="btn btn-primary w-100">
                        Back to Login
                    </a>

                </div>

            </div>

            <p class="text-center mt-3 text-muted">
                Summer Internship Project 2026
            </p>

        </div>

    </div>

</div>

</body>
</html>
