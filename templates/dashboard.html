<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="mb-4">Online Poll Survey Dashboard</h1>

    <a href="/create_poll" class="btn btn-success">
        Create New Poll
    </a>

    <a href="/logout" class="btn btn-danger">
        Logout
    </a>

    <hr>

    <!-- Statistics Card -->
    <div class="row mb-4">

    <div class="col-md-4">

        <div class="card border-0 shadow-lg">

            <div class="card-body text-center">

                <h1 class="text-primary">
                    {{ total_polls }}
                </h1>

                <h5>Total Polls</h5>

            </div>

        </div>

    </div>

    <div class="col-md-4">

        <div class="card border-0 shadow-lg">

            <div class="card-body text-center">

                <h1 class="text-success">
                    {{ total_votes }}
                </h1>

                <h5>Total Votes</h5>

            </div>

        </div>

    </div>

</div>

    <div class="row mt-4">

        {% for poll in polls %}

        <div class="col-md-4 mb-4">

            <div class="card shadow">

                <div class="card-body">

                    <h5>{{ poll[1] }}</h5>

                    <a href="/vote/{{ poll[0] }}"
                       class="btn btn-primary">
                       Vote
                    </a>

                    <a href="/results/{{ poll[0] }}"
                       class="btn btn-secondary">
                       Results
                    </a>

                    <a href="/delete_poll/{{ poll[0] }}"
                       class="btn btn-danger">
                       Delete
                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
